services:
  jarvis-write:
    build:
      context: .
      args:
        # 部署时设 GIT_COMMIT=$(git rev-parse --short HEAD) 烤入当前提交号(更新提醒用)
        GIT_COMMIT: ${GIT_COMMIT:-dev}
    container_name: jarvis-write
    ports:
      # 宿主机端口可用 PORT 覆盖(服务器上 8000 被占用时用 8080)
      - "${PORT:-8000}:8000"
    environment:
      # 数据(SQLite + Chroma)统一落在 /srv/data,用 named volume 持久化,
      # 不再整目录挂载 —— 更新镜像代码后不会被旧 volume 覆盖。
      - DATABASE_URL=sqlite:////srv/data/jarvis_write.db
      - CHROMA_PERSIST_DIR=/srv/data/chroma_data
      # ===== 多用户认证 =====
      # 运行环境:prod → 启动自检拒绝弱默认 JWT 密钥(见 app/main.py、docs/06)
      - APP_ENV=prod
      # 注册邀请码:固定共享码,发给要注册的人;留空则关闭注册。
      - INVITE_CODE=${INVITE_CODE:-}
      # JWT 签名密钥:务必设成随机长串(否则 token 可被伪造)。
      - JWT_SECRET=${JWT_SECRET:?请在 .env 或环境变量里设置一个随机长串}
      # 初始管理员(首次启动自动创建,存量数据归其名下)。
      # 密码强制必填:代码里的默认值 admin12345 仅限本地开发,带上公网等于白给。
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?请设置一个强密码作为初始管理员密码}
      # 每个账号进来单独配自己的 key(存数据库);默认不放共享 key。
      # 如需 .env 兜底可自行取消注释:
      # - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      # - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    volumes:
      - jarvis_data:/srv/data
    restart: unless-stopped

volumes:
  jarvis_data:
    # 固定卷名,与线上既有数据卷 jarvis_write_data 对齐
    name: jarvis_write_data
